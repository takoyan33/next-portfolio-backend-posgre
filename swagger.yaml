components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Authorization ヘッダーに Bearer <token> 形式で JWT トークンを設定してください。

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer

  schemas:
    AuthRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: password123

    AuthUser:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: user@example.com

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9.example.jwt
        user:
          $ref: "#/components/schemas/AuthUser"

    ValidateTokenResponse:
      type: object
      properties:
        message:
          type: string
          example: Token is valid
        user:
          $ref: "#/components/schemas/AuthUser"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Not Authorized
        message:
          oneOf:
            - type: string
            - type: array
              items:
                type: string

    History:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        date:
          type: string
        body:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    HistoryInput:
      type: object
      required:
        - history
      properties:
        history:
          type: object
          required:
            - title
            - date
            - body
          properties:
            title:
              type: string
            date:
              type: string
            body:
              type: string

    License:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        date:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    LicenseInput:
      type: object
      required:
        - license
      properties:
        license:
          type: object
          required:
            - title
            - date
          properties:
            title:
              type: string
            date:
              type: string

    Job:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        date:
          type: string
        body:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    JobInput:
      type: object
      required:
        - job
      properties:
        job:
          type: object
          required:
            - title
            - date
            - body
          properties:
            title:
              type: string
            date:
              type: string
            body:
              type: string

    Portfolio:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        date:
          type: string
        tag:
          type: array
          items:
            type: string
        topImg:
          type: string
        front_url:
          type: string
          nullable: true
        back_url:
          type: string
          nullable: true
        front_github:
          type: string
          nullable: true
        back_github:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        about:
          type: string
          nullable: true
        aboutImg:
          type: string
          nullable: true
        function:
          type: string
          nullable: true
        functionImg:
          type: string
          nullable: true
        appeal:
          type: string
          nullable: true
        appealImg:
          type: string
          nullable: true
        front_skill:
          type: array
          items:
            type: string
        back_skill:
          type: array
          items:
            type: string
        infra_skill:
          type: array
          items:
            type: string
        time:
          type: string
        prev_title:
          type: string
          nullable: true
        prev_article_id:
          type: string
          nullable: true
        next_title:
          type: string
          nullable: true
        next_article_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PortfolioInput:
      type: object
      required:
        - portfolio
      properties:
        portfolio:
          type: object
          required:
            - name
            - date
            - tag
            - topImg
            - time
          properties:
            name:
              type: string
            date:
              type: string
            tag:
              type: array
              items:
                type: string
            topImg:
              type: string
            front_url:
              type: string
              nullable: true
            back_url:
              type: string
              nullable: true
            front_github:
              type: string
              nullable: true
            back_github:
              type: string
              nullable: true
            color:
              type: string
              nullable: true
            about:
              type: string
              nullable: true
            aboutImg:
              type: string
              nullable: true
            function:
              type: string
              nullable: true
            functionImg:
              type: string
              nullable: true
            appeal:
              type: string
              nullable: true
            appealImg:
              type: string
              nullable: true
            front_skill:
              type: array
              items:
                type: string
            back_skill:
              type: array
              items:
                type: string
            infra_skill:
              type: array
              items:
                type: string
            time:
              type: string
            prev_title:
              type: string
              nullable: true
            prev_article_id:
              type: string
              nullable: true
            next_title:
              type: string
              nullable: true
            next_article_id:
              type: string
              nullable: true

    Skill:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        rank:
          type: string
        tag:
          type: string
        about:
          type: string
          nullable: true
        icon:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SkillInput:
      type: object
      properties:
        front_skill:
          $ref: "#/components/schemas/SkillBody"
        back_skill:
          $ref: "#/components/schemas/SkillBody"
        infra_skill:
          $ref: "#/components/schemas/SkillBody"
        other_skill:
          $ref: "#/components/schemas/SkillBody"
      anyOf:
        - required: [front_skill]
        - required: [back_skill]
        - required: [infra_skill]
        - required: [other_skill]

    SkillBody:
      type: object
      required:
        - name
        - rank
        - tag
        - icon
      properties:
        name:
          type: string
        rank:
          type: string
        tag:
          type: string
        about:
          type: string
          nullable: true
        icon:
          type: string

    Profile:
      type: object
      properties:
        id:
          type: integer
        content:
          type: string
        hobby:
          type: string
        license:
          type: string
