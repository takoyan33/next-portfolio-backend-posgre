openapi: 3.0.1
info:
  title: To You Design API
  version: v1
  description: To You Design の API です。

paths:
  /api/v1/auth/register:
    post:
      summary: ユーザー新規登録
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "201":
          description: ユーザー登録に成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "422":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/login:
    post:
      summary: ログインしてJWTトークンを取得
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "200":
          description: ログイン成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: メールアドレスまたはパスワードが不正
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/validate:
    get:
      summary: ログイン中トークンの有効性を確認
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        "200":
          description: トークンが有効
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateTokenResponse"
        "401":
          description: トークンが無効
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

