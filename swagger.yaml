openapi: 3.0.1
info:
  title: To You Design API
  version: v1
  description: To You Design の API です。

paths:
  /api/v1/auth/register:
    post:
      summary: ユーザー新規登録
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "201":
          description: ユーザー登録に成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "422":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/login:
    post:
      summary: ログインしてJWTトークンを取得
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "200":
          description: ログイン成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: メールアドレスまたはパスワードが不正
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/histories:
    get:
      summary: 経歴一覧を取得
      tags:
        - Histories
      responses:
        "200":
          description: 経歴一覧の取得に成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: SUCCESS
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Histories"
  /api/v1/licenses:
    get:
      summary: 資格一覧を取得
      tags:
        - Licenses
      responses:
        "200":
          description: 資格一覧の取得に成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: SUCCESS
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Licenses"
  /api/v1/jobs:
    get:
      summary: 職歴一覧を取得
      tags:
        - Jobs
      responses:
        "200":
          description: 職歴一覧の取得に成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: SUCCESS
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Jobs"
  /api/v1/portfolios:
    get:
      summary: ポートフォリオ一覧を取得
      tags:
        - Portfolios
      responses:
        "200":
          description: ポートフォリオ一覧の取得に成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: SUCCESS
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Portfolios"
  /api/v1/front_skills:
    get:
      summary: フロントエンドスキル一覧を取得
      tags:
        - FrontSkills
      responses:
        "200":
          description: フロントエンドスキル一覧の取得に成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: SUCCESS
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/FrontSkill"
  /api/v1/back_skills:
    get:
      summary: バックエンドスキル一覧を取得
      tags:
        - BackSkills
      responses:
        "200":
          description: バックエンドスキル一覧の取得に成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: SUCCESS
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/BackSkill"
  /api/v1/infra_skills:
    get:
      summary: インフラスキル一覧を取得
      tags:
        - InfraSkills
      responses:
        "200":
          description: インフラスキル一覧の取得に成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: SUCCESS
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/InfraSkill"
  /api/v1/other_skills:
    get:
      summary: その他スキル一覧を取得
      tags:
        - OtherSkills
      responses:
        "200":
          description: その他スキル一覧の取得に成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: SUCCESS
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/OtherSkill"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Authorization ヘッダーに Bearer <token> 形式で JWT トークンを設定してください。
  schemas:
    AuthRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: password123
    AuthUser:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: user@example.com
    AuthResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9.example.jwt
        user:
          $ref: "#/components/schemas/AuthUser"
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Not Authorized
    Histories:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        date:
          type: string
        body:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Portfolios:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        date:
          type: string
        tag:
          type: array
          items:
            type: string
        topImg:
          type: string
        front_url:
          type: string
          nullable: true
        back_url:
          type: string
          nullable: true
        front_github:
          type: string
          nullable: true
        back_github:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        about:
          type: string
          nullable: true
        aboutImg:
          type: string
          nullable: true
        function:
          type: string
          nullable: true
        functionImg:
          type: string
          nullable: true
        appeal:
          type: string
          nullable: true
        appealImg:
          type: string
          nullable: true
        front_skill:
          type: array
          items:
            type: string
        back_skill:
          type: array
          items:
            type: string
        infra_skill:
          type: array
          items:
            type: string
        time:
          type: string
        prev_title:
          type: string
          nullable: true
        prev_article_id:
          type: string
          nullable: true
        next_title:
          type: string
          nullable: true
        next_article_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Licenses:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        date:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Jobs:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        date:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    FrontSkill:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    BackSkill:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    InfraSkill:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    OtherSkill:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

